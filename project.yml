name: Fader
options:
  bundleIdPrefix: com.hatim
  # macOS 15 floor (Core Audio process taps need 14.4+; we target 15/26 for the
  # modern APIs + Liquid Glass). Runs on 15 (plain) and 26 (glass) via #available.
  deploymentTarget:
    macOS: "15.0"
  createIntermediateGroups: true
  groupSortPosition: top

packages:
  # In-app updates via a signed appcast hosted on GitHub Releases (manual click;
  # no background checks). Same setup as Relay.
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.6.0"

settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    # Dev builds are ad-hoc signed (CODE_SIGN_IDENTITY "-"). scripts/release.sh can
    # re-sign with Developer ID (DRF GROUP, team ULHJAB7ZT3) + notarize for a
    # warning-free download; until then "Open Anyway" works for the open-source build.
    CODE_SIGN_STYLE: Manual
    CODE_SIGN_IDENTITY: "-"
    ENABLE_HARDENED_RUNTIME: YES
    DEAD_CODE_STRIPPING: YES
    ARCHS: "arm64 x86_64"
    ONLY_ACTIVE_ARCH: NO

targets:
  Fader:
    type: application
    platform: macOS
    sources:
      - path: Fader
    dependencies:
      - package: Sparkle
    info:
      path: Fader/Info.plist
      properties:
        LSUIElement: true   # menu-bar only, no Dock icon
        NSAudioCaptureUsageDescription: "Fader uses audio access to adjust the volume of individual apps. Audio is never recorded, stored, or sent anywhere."
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        # Sparkle: signed appcast on GitHub Releases, manual checks only.
        SUFeedURL: "https://github.com/hatimhtm/Fader/releases/latest/download/appcast.xml"
        SUPublicEDKey: "WC5lwvOF89DNNoaqkTAcEXpmVGgOsjNATYKj17s90aY="
        SUEnableAutomaticChecks: false
    settings:
      base:
        PRODUCT_NAME: Fader
        PRODUCT_BUNDLE_IDENTIFIER: com.hatim.Fader
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_ENTITLEMENTS: Fader/Fader.entitlements
        ENABLE_APP_SANDBOX: NO
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks"
